<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>造纸产线 联机实训</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        :root {
            --bg-color: #F4F7FE; --card-bg: #FFFFFF;
            --primary: #6C5CE7; --primary-hover: #5b4bc4;
            --text-main: #2B3674; --text-sub: #A3AED0;
            --danger: #FF5B5B; --success: #05CD99;
            --shadow-soft: 0px 10px 25px rgba(112, 144, 176, 0.08);
            --font-family: 'Nunito', -apple-system, sans-serif;
        }
        body { margin: 0; padding: 0; font-family: var(--font-family); background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 247, 254, 0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .login-box { background: white; padding: 30px; border-radius: 24px; box-shadow: var(--shadow-soft); text-align: center; width: 85%; max-width: 380px; max-height: 80vh; overflow-y: auto; }
        .login-box h2 { color: var(--text-main); margin-top: 0; }
        .login-box p { color: var(--text-sub); font-size: 14px; margin-bottom: 20px; }
        .role-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid transparent; border-radius: 16px; background: #F8F9FA; font-size: 16px; font-weight: 800; color: var(--text-main); cursor: pointer; transition: 0.3s; }
        .role-btn:hover:not(:disabled) { border-color: var(--primary); background: #F0EDFF; color: var(--primary); transform: translateY(-2px); }
        .role-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #e0e0e0; color: #999; text-decoration: line-through; }
        .role-btn.host-btn { background: linear-gradient(135deg, #FFD194 0%, #FFB347 100%); color: #5D4037; border: none; }
        .role-btn.host-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,179,71,0.4); }
        .role-btn.host-btn:disabled { background: #e0e0e0; color: #999; box-shadow: none; }
        .role-divider { font-size: 12px; color: var(--text-sub); margin: 15px 0 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .header { background: rgba(244, 247, 254, 0.8); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .header-title { font-weight: 800; font-size: 17px; color: var(--text-main); }
        .header-sub { font-size: 12px; color: var(--success); font-weight: 700; }
        .chat-area { flex: 1; padding: 20px 20px 100px 20px; overflow-y: auto; scroll-behavior: smooth; }
        .message-row { display: flex; margin-bottom: 24px; align-items: flex-end; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
        .message-row.left { flex-direction: row; justify-content: flex-start; }
        .message-row.right { flex-direction: row-reverse; justify-content: flex-start; }
        .avatar { width: 36px; height: 36px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: white; flex-shrink: 0; margin-bottom: 4px; box-shadow: var(--shadow-soft); }
        .content-div { max-width: 80%; display: flex; flex-direction: column; }
        .message-row.left .content-div { align-items: flex-start; margin-left: 12px; }
        .message-row.right .content-div { align-items: flex-end; margin-right: 12px; }
        .name-tag { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; margin-left: 4px; }
        .bubble { padding: 14px 18px; position: relative; font-size: 15px; font-weight: 600; line-height: 1.6; word-wrap: break-word; box-shadow: var(--shadow-soft); }
        .msg-sys .avatar { background: linear-gradient(135deg, #FF758C 0%, #FF7EB3 100%); font-size: 12px;}
        .msg-other .avatar { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); }
        .msg-host .avatar { background: linear-gradient(135deg, #FFD194 0%, #FFB347 100%); }
        .message-row.left .bubble { background-color: var(--card-bg); color: var(--text-main); border-radius: 20px 20px 20px 4px; }
        .msg-me .avatar { display: none; }
        .message-row.right .bubble { background: linear-gradient(135deg, var(--primary) 0%, #9D89FF 100%); color: #ffffff; border-radius: 20px 20px 4px 20px; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; width: 100%; }
        .option-btn { background: #F8F9FA; border: 2px solid transparent; border-radius: 16px; padding: 14px 10px; font-size: 16px; font-weight: 800; color: var(--text-main); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s;}
        .option-btn span { font-size: 12px; font-weight: 600; color: var(--text-sub); }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #F0EDFF; color: var(--primary); }
        .option-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-link-btn { margin-top: 12px; display: inline-block; padding: 14px 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-size: 15px; font-weight: 800; cursor: pointer; width: 100%; text-align: center; transition: 0.2s;}
        .action-link-btn:disabled { background: var(--text-sub); cursor: not-allowed; }
        .footer-wrapper { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 20px 25px 20px; background: linear-gradient(to bottom, rgba(244,247,254,0), rgba(244,247,254,1) 40%); }
        .footer { background-color: var(--card-bg); border-radius: 25px; padding: 6px 6px 6px 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(112, 144, 176, 0.15); }
        .input-box { flex: 1; border: none; outline: none; font-size: 15px; font-weight: 600; background: transparent; padding: 10px 0; color: var(--text-main); font-family: var(--font-family); }
        .send-btn { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .highlight-clue { display: block; margin-top: 12px; padding: 12px 16px; border-radius: 16px; background: linear-gradient(135deg, #FFD194 0%, #70E1F5 100%); color: #1A365D; font-weight: 800; text-align: center; }
        .hint-text { color: var(--danger); font-size: 13px; font-weight: 700; margin-top: 10px; background: #FFF0F0; padding: 10px; border-radius: 12px; border-left: 4px solid var(--danger);}
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>选择你的身份</h2>
            <p>本房间需要6组齐聚才能通关<br>请与其他成员协商，不要选择重复的身份</p>
            <button class="role-btn host-btn" id="btn-host">🎮 主控（不答题，控制流程）</button>
            <div class="role-divider">\u2014 答题小组 \u2014</div>
            <button class="role-btn" id="btn-A">👥 小组A</button>
            <button class="role-btn" id="btn-B">👥 小组B</button>
            <button class="role-btn" id="btn-C">👥 小组C</button>
            <button class="role-btn" id="btn-D">👥 小组D</button>
            <button class="role-btn" id="btn-E">👥 小组E</button>
            <button class="role-btn" id="btn-F">👥 小组F</button>
        </div>
    </div>

    <div class="header">
        <div style="display:flex; flex-direction:column;">
            <span class="header-title">造纸产线联机实训</span>
            <span class="header-sub" id="statusText">等待连接服务器...</span>
        </div>
        <div id="myRoleTag" style="font-weight: 800; color: var(--primary);"></div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="footer-wrapper">
        <div class="footer">
            <input type="text" class="input-box" id="inputBox" placeholder="和队友聊点什么...">
            <button class="send-btn" id="sendBtn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/></svg>
            </button>
        </div>
    </div>

<script>
    // ===== 题库 =====
    var questions = [
        { q: "<b>LEVEL 1</b><br>\u5728\u957f\u7f51\u9020\u7eb8\u673a\u6210\u5f62\u8fc7\u7a0b\u4e2d\uff0c\u6d46\u6599\u4ece\u6d41\u6d46\u7bb1\u55b7\u5c04\u5230\u94dc\u7f51\u4e0a\u7684\u89d2\u5ea6\u4e3b\u8981\u5f71\u54cd\u7684\u662f\u4ec0\u4e48\uff1f", ans: "B", hint: "\u55b7\u5c04\u89d2\u5ea6\u76f4\u63a5\u5f71\u54cd\u7ea4\u7ef4\u5728\u7f51\u4e0a\u7684\u5206\u5e03\u548c\u5b9a\u5411\uff0c\u8fdb\u800c\u5f71\u54cd\u7eb8\u5f20\u7684\u7eb5\u6a2a\u5411\u5f3a\u5ea6\u6bd4\u3002", clue: "\u7ebf\u7d22\u4e00\uff1a\u8584\u5982\u8749\u7ffc \ud83e\udd8b" },
        { q: "<b>LEVEL 2</b><br>\u9020\u7eb8\u6210\u5f62\u5de5\u827a\u4e2d\uff0c\u4ea7\u751f\u201c\u52fe\u6d46\u201d\u73b0\u8c61\u6700\u53ef\u80fd\u5bfc\u81f4\u7eb8\u5f20\u51fa\u73b0\u4ec0\u4e48\u7f3a\u9677\uff1f", ans: "A", hint: "\u52fe\u6d46\u901a\u5e38\u6307\u7ea4\u7ef4\u7d6e\u805a\u6216\u6742\u8d28\u5835\u585e\u6d41\u6d46\u7bb1\u5507\u53e3\uff0c\u5bfc\u81f4\u6d46\u6599\u65ad\u6d41\uff0c\u5728\u7eb8\u9875\u4e0a\u5f62\u6210\u5b54\u6d1e\u6216\u900f\u5149\u70b9\u3002", clue: "\u7ebf\u7d22\u4e8c\uff1a\u67d4\u4e2d\u5e26\u521a \ud83d\udde1\ufe0f" },
        { q: "<b>LEVEL 3</b><br>\u957f\u7f51\u9020\u7eb8\u673a\u7f51\u90e8\u8131\u6c34\u7684\u4e3b\u8981\u539f\u7406\u662f\u4f9d\u9760\u4ec0\u4e48\uff1f", ans: "B", hint: "\u7f51\u90e8\u8131\u6c34\u521d\u671f\u9760\u91cd\u529b\uff0c\u540e\u671f\u4e3b\u8981\u9760\u771f\u7a7a\u7bb1\u7684\u8d1f\u538b\u62bd\u5438\uff0c\u4f7f\u6e7f\u7eb8\u9875\u6210\u5f62\u3002", clue: "\u7ebf\u7d22\u4e09\uff1a\u4e24\u9762\u6709\u522b \ud83c\udfad" },
        { q: "<b>LEVEL 4</b><br>\u5728\u9020\u7eb8\u6e7f\u90e8\u5316\u5b66\u4e2d\uff0c\u6dfb\u52a0\u201c\u52a9\u7559\u5242\u201d\u7684\u4e3b\u8981\u4f5c\u7528\u662f\uff1f", ans: "C", hint: "\u52a9\u7559\u5242\u901a\u5e38\u4e3a\u9ad8\u5206\u5b50\u805a\u5408\u7269\uff0c\u901a\u8fc7\u7d6e\u51dd\u4f5c\u7528\u4f7f\u7ec6\u5c0f\u7ea4\u7ef4\u548c\u586b\u6599\u4fdd\u7559\u5728\u7eb8\u9875\u4e2d\uff0c\u51cf\u5c11\u6d41\u5931\u3002", clue: "\u7ebf\u7d22\u56db\uff1a\u7edd\u4e0d\u5bfc\u7535 \u26a1" },
        { q: "<b>LEVEL 5</b><br>\u751f\u4ea7\u8fc7\u7a0b\u4e2d\uff0c\u53bb\u9664\u6d46\u6599\u4e2d\u91d1\u5c5e\u79bb\u5b50\uff08\u5982\u94c1\u3001\u94dc\uff09\u7684\u5173\u952e\u5de5\u5e8f\u901a\u5e38\u662f\uff1f", ans: "B", hint: "\u901a\u8fc7\u951f\u5f62\u9664\u6e23\u5668\u3001\u538b\u529b\u7b5b\u7b49\u7b5b\u9009\u51c0\u5316\u8bbe\u5907\uff0c\u5229\u7528\u79bb\u5fc3\u6216\u8fc7\u6ee4\u539f\u7406\u53bb\u9664\u6d46\u6599\u4e2d\u7684\u91cd\u6742\u8d28\u548c\u91d1\u5c5e\u9897\u7c92\u3002", clue: "\u7ebf\u7d22\u4e94\uff1a\u6d78\u6c34\u4e0d\u6563 \ud83d\udca7" }
    ];
    var qOptions = [
        ["\u7eb8\u5f20\u7684\u5b9a\u91cf", "\u7ea4\u7ef4\u5b9a\u5411\u6392\u5217", "\u7eb8\u5f20\u7684\u542b\u6c34\u91cf", "\u70d8\u7f38\u6e29\u5ea6\u63a7\u5236"],
        ["\u900f\u5149\u70b9(\u5b54\u6d1e)", "\u539a\u8584\u4e0d\u5747", "\u5c18\u57c3\u5ea6\u8fc7\u9ad8", "\u9759\u7535\u79ef\u7d2f"],
        ["\u70d8\u7f38\u7684\u70ed\u91cf\u84b8\u53d1", "\u771f\u7a7a\u7bb1\u62bd\u5438\u548c\u91cd\u529b", "\u538b\u8f8a\u7684\u673a\u68b0\u6324\u538b", "\u522e\u5200\u7684\u526a\u5207\u529b"],
        ["\u63d0\u9ad8\u7eb8\u5f20\u7684\u767d\u5ea6", "\u9632\u6b62\u7ec6\u83cc\u6ecb\u751f", "\u63d0\u9ad8\u7ec6\u5c0f\u7ea4\u7ef4\u7559\u7740\u7387", "\u589e\u52a0\u7eb8\u9762\u5149\u6ed1\u5ea6"],
        ["\u6253\u6d46", "\u7b5b\u9009\u548c\u51c0\u5316", "\u538b\u5149", "\u590d\u5377"]
    ];

    // ===== 全局状态 =====
    var myRole = "";
    var currentQIndex = 0;
    var roomAnswers = {};
    var answerRoles = ["\u5c0f\u7ec4A", "\u5c0f\u7ec4B", "\u5c0f\u7ec4C", "\u5c0f\u7ec4D", "\u5c0f\u7ec4E", "\u5c0f\u7ec4F"];
    var isHost = false;
    var mqttReady = false;
    var takenRoles = {}; // 已被选走的角色

    var chatArea = document.getElementById("chatArea");
    var inputBox = document.getElementById("inputBox");

    // ===== MQTT =====
    var client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");
    var ROOM_TOPIC = "dajiang_training_room_6group_01";

    client.on("connect", function() {
        mqttReady = true;
        document.getElementById("statusText").innerText = "\ud83d\udfe2 \u5df2\u8fde\u63a5\u670d\u52a1\u5668";
        client.subscribe(ROOM_TOPIC);
        // 进入后请求当前已选角色列表
        publishNetMsg({ type: "REQUEST_ROLES" });
    });

    client.on("error", function(err) {
        document.getElementById("statusText").innerText = "\ud83d\udd34 \u8fde\u63a5\u5931\u8d25";
        console.error("MQTT error:", err);
    });

    // ===== 登录按钮绑定 =====
    var roleMap = {
        "btn-host": "\u4e3b\u63a7",
        "btn-A": "\u5c0f\u7ec4A",
        "btn-B": "\u5c0f\u7ec4B",
        "btn-C": "\u5c0f\u7ec4C",
        "btn-D": "\u5c0f\u7ec4D",
        "btn-E": "\u5c0f\u7ec4E",
        "btn-F": "\u5c0f\u7ec4F"
    };

    Object.keys(roleMap).forEach(function(btnId) {
        document.getElementById(btnId).addEventListener("click", function() {
            joinRoom(roleMap[btnId]);
        });
    });

    function updateLoginButtons() {
        Object.keys(roleMap).forEach(function(btnId) {
            var role = roleMap[btnId];
            var btn = document.getElementById(btnId);
            if (takenRoles[role]) {
                btn.disabled = true;
                btn.textContent = (role === "\u4e3b\u63a7" ? "\ud83c\udfae " : "\ud83d\udc65 ") + role + " \uff08\u5df2\u52a0\u5165\uff09";
            }
        });
    }

    function joinRoom(role) {
        if (!mqttReady) {
            alert("\u670d\u52a1\u5668\u5c1a\u672a\u8fde\u63a5\uff0c\u8bf7\u7a0d\u7b49\u51e0\u79d2\u518d\u8bd5...");
            return;
        }
        if (takenRoles[role]) {
            alert("\u8be5\u89d2\u8272\u5df2\u88ab\u5176\u4ed6\u4eba\u9009\u62e9\uff0c\u8bf7\u9009\u62e9\u5176\u4ed6\u89d2\u8272\uff01");
            return;
        }
        myRole = role;
        isHost = (role === "\u4e3b\u63a7");
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("myRoleTag").innerText = myRole;

        // 广播：我选了这个角色
        var joinText = isHost ? "\u4e3b\u63a7\u5df2\u4e0a\u7ebf\uff0c\u51c6\u5907\u5f00\u59cb\u5b9e\u8bad\uff01" : "\u8bbe\u5907\u8fde\u63a5\u6210\u529f\uff0c\u5df2\u5c31\u4f4d\uff01";
        publishNetMsg({ type: "ROLE_TAKEN", role: myRole });
        publishNetMsg({ type: "CHAT", role: myRole, text: joinText });

        if (isHost) {
            setTimeout(function() {
                showStartButton();
            }, 1000);
        } else {
            appendSysMsg("\u7b49\u5f85 <b>\u4e3b\u63a7</b> \u6fc0\u6d3b\u7cfb\u7edf...");
        }
    }

    function showStartButton() {
        var html = '\u5168\u5458\u5230\u9f50\u540e\uff0c\u8bf7\u70b9\u51fb\u4e0b\u65b9\u6309\u94ae\u6fc0\u6d3b\u9898\u5e93\u7cfb\u7edf\u3002<br><button class="action-link-btn" id="startBtn">\ud83d\ude80 \u6fc0\u6d3b\u9898\u5e93\u7cfb\u7edf</button>';
        appendSysMsg(html);
        setTimeout(function() {
            var btn = document.getElementById("startBtn");
            if (btn) btn.addEventListener("click", function() { publishNetMsg({ type: "START" }); });
        }, 100);
    }

    // ===== 发送题目（主控和答题组看到不同内容） =====
    function showQuestion(qIdx) {
        var qText = "<b>\u7cfb\u7edf\u901a\u77e5</b>\uff1a\u8fdb\u5165\u7b2c " + (qIdx + 1) + " \u5173\uff01<br><br>" + questions[qIdx].q;

        if (isHost) {
            qText += '<br><br><span style="color:var(--text-sub);font-size:13px;">\u23f3 \u7b49\u5f85\u516d\u7ec4\u63d0\u4ea4\u7b54\u6848...</span>';
            appendSysMsg(qText);
        } else {
            qText += getOptionsHTML(qIdx);
            appendSysMsg(qText);
            bindOptionButtons();
        }
    }

    // ===== 接收消息 =====
    client.on("message", function(topic, message) {
        var data;
        try { data = JSON.parse(message.toString()); } catch(e) { return; }

        // 角色被选走
        if (data.type === "ROLE_TAKEN") {
            takenRoles[data.role] = true;
            updateLoginButtons();
            return;
        }

        // 有人请求已选角色列表，如果我已选角色就广播回去
        if (data.type === "REQUEST_ROLES") {
            if (myRole) {
                publishNetMsg({ type: "ROLE_TAKEN", role: myRole });
            }
            return;
        }

        // 聊天消息
        if (data.type === "CHAT") {
            appendUserMsg(data.role, data.text);
        }

        // 开始 / 下一题
        else if (data.type === "START" || data.type === "NEXT") {
            if (data.type === "START") currentQIndex = 0;
            else currentQIndex++;

            roomAnswers = {};
            disableOldButtons();
            showQuestion(currentQIndex);
        }

        // 有人提交答案
        else if (data.type === "ANSWER") {
            roomAnswers[data.role] = data.ans;
            appendUserMsg(data.role, "\u63d0\u4ea4\u4e86\u7b54\u6848\uff1a<b>\u9009\u9879 " + data.ans + "</b>");

            // 主控收齐6组答案后判卷
            if (isHost && Object.keys(roomAnswers).length === answerRoles.length) {
                checkAnswers();
            }
        }

        // 判卷通过
        else if (data.type === "JUDGE_PASS") {
            var reply = '\u56db\u7ec4\u7b54\u6848\u4e00\u81f4\u4e14\u6b63\u786e\uff0c\u6821\u9a8c\u901a\u8fc7 \u2705<div class="highlight-clue">\ud83d\udd11 \u83b7\u5f97 ' + questions[currentQIndex].clue + '</div>';
            if (currentQIndex === questions.length - 1) {
                reply += '<br><br>\ud83c\udf89 <b>\u5b9e\u8bad\u5706\u6ee1\u6210\u529f\uff01</b><br>\u4f60\u4eec\u5df2\u96c6\u9f50\u6240\u6709\u79d8\u7c4d\uff0c\u5bc6\u5ba4\u5927\u95e8\u5df2\u5f00\u542f\uff01';
                appendSysMsg(reply);
            } else {
                if (isHost) {
                    reply += '<button class="action-link-btn" onclick="this.disabled=true;publishNetMsg({type:\'NEXT\'})">\u8fdb\u5165\u4e0b\u4e00\u5173 \u27a1\ufe0f</button>';
                } else {
                    reply += '<br><span style="color:#888;font-size:12px;">\u7b49\u5f85 \u4e3b\u63a7 \u5f00\u542f\u4e0b\u4e00\u5173...</span>';
                }
                appendSysMsg(reply);
            }
        }

        // 判卷失败 -> 给提示 + 自动重新发题
        else if (data.type === "JUDGE_FAIL") {
            roomAnswers = {};
            disableOldButtons();
            appendSysMsg('\u26a0\ufe0f \u7b54\u6848\u4e0d\u4e00\u81f4\u6216\u5b58\u5728\u9519\u8bef\uff0c\u5168\u5458\u6821\u9a8c\u5931\u8d25\uff01<div class="hint-text"><b>\ud83d\udca1 \u77e5\u8bc6\u5e93\u63d0\u793a\uff1a</b><br>' + questions[currentQIndex].hint + '</div>\u8bf7\u5927\u5bb6\u8ba8\u8bba\u540e\u91cd\u65b0\u4f5c\u7b54\uff1a');

            // 自动重新发送当前题目
            setTimeout(function() {
                showQuestion(currentQIndex);
            }, 500);
        }
    });

    // ===== 工具函数 =====
    function publishNetMsg(payload) {
        if (mqttReady) {
            client.publish(ROOM_TOPIC, JSON.stringify(payload));
        }
    }

    function sendChat() {
        var text = inputBox.value.trim();
        if (text && myRole) {
            publishNetMsg({ type: "CHAT", role: myRole, text: text });
            inputBox.value = "";
        }
    }

    function selectAnswer(ans) {
        if (isHost) return;
        if (roomAnswers[myRole]) return;
        publishNetMsg({ type: "ANSWER", role: myRole, ans: ans });
    }

    function checkAnswers() {
        var allCorrect = true;
        for (var i = 0; i < answerRoles.length; i++) {
            if (roomAnswers[answerRoles[i]] !== questions[currentQIndex].ans) {
                allCorrect = false;
                break;
            }
        }
        publishNetMsg({ type: allCorrect ? "JUDGE_PASS" : "JUDGE_FAIL" });
    }

    function getOptionsHTML(qIndex) {
        var opts = qOptions[qIndex];
        return '<div class="options-container">' +
            '<button class="option-btn" data-ans="A">A<span>' + opts[0] + '</span></button>' +
            '<button class="option-btn" data-ans="B">B<span>' + opts[1] + '</span></button>' +
            '<button class="option-btn" data-ans="C">C<span>' + opts[2] + '</span></button>' +
            '<button class="option-btn" data-ans="D">D<span>' + opts[3] + '</span></button>' +
            '</div>';
    }

    function bindOptionButtons() {
        setTimeout(function() {
            var btns = document.querySelectorAll(".option-btn:not([disabled])");
            btns.forEach(function(btn) {
                if (!btn.dataset.bound) {
                    btn.dataset.bound = "true";
                    btn.addEventListener("click", function() {
                        selectAnswer(this.dataset.ans);
                    });
                }
            });
        }, 100);
    }

    function appendSysMsg(text) {
        var row = document.createElement("div");
        row.className = "message-row left msg-sys";
        row.innerHTML = '<div class="avatar">AI</div><div class="content-div"><div class="name-tag">AI \u5bfc\u5e08</div><div class="bubble">' + text + '</div></div>';
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function appendUserMsg(role, text) {
        var row = document.createElement("div");
        var isMe = (role === myRole);
        var isMsgHost = (role === "\u4e3b\u63a7");
        row.className = "message-row " + (isMe ? "right msg-me" : "left " + (isMsgHost ? "msg-host" : "msg-other"));

        var avatarText = (role === "\u4e3b\u63a7") ? "\ud83c\udfae" : role.replace("\u5c0f\u7ec4", "");

        if (isMe) {
            row.innerHTML = '<div class="content-div"><div class="bubble">' + text + '</div></div>';
        } else {
            row.innerHTML = '<div class="avatar">' + avatarText + '</div><div class="content-div"><div class="name-tag">' + role + '</div><div class="bubble">' + text + '</div></div>';
        }
        chatArea.appendChild(row);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function disableOldButtons() {
        document.querySelectorAll(".option-btn, .action-link-btn").forEach(function(b) { b.disabled = true; });
    }

    // ===== 发送按钮 & 回车 =====
    document.getElementById("sendBtn").addEventListener("click", sendChat);
    inputBox.addEventListener("keypress", function(e) { if (e.key === "Enter") sendChat(); });
</script>
</body>
</html>
